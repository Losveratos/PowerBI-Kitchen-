<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p(doom) nach Rolle — wer schätzt höher?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#f4f1e8; --ink:#13233b; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ background:var(--paper); background-image:radial-gradient(rgba(19,35,59,.03) 1px,transparent 1px);
    background-size:22px 22px; min-height:100vh; display:flex; justify-content:center; padding:clamp(10px,2.5vw,40px); }
  .wrap{width:100%;max-width:1040px;position:relative;}
  svg{width:100%;height:auto;display:block;opacity:0;animation:fade .7s ease .1s forwards;}
  @keyframes fade{to{opacity:1;}}
  @media (prefers-reduced-motion: reduce){ svg{animation:none;opacity:1;} }
  .hl{font-family:'Anton',sans-serif;fill:var(--ink);letter-spacing:.5px;}
  .nm{font-family:'Archivo',sans-serif;font-weight:700;fill:var(--ink);}
  .sub2{font-family:'Archivo',sans-serif;font-weight:700;fill:var(--ink);letter-spacing:.8px;}
  text{dominant-baseline:alphabetic;}
  .pt{cursor:pointer;}
  .pt .mk{transition:transform .12s ease;}
  .pt:hover .mk{transform:scale(1.5);transform-box:fill-box;transform-origin:center;}
  #tip{ position:fixed;z-index:30;pointer-events:none;opacity:0;transform:translateY(4px);
    transition:opacity .12s ease, transform .12s ease; max-width:260px;background:#fff;border:1px solid #13233b;border-left:4px solid #13233b;
    border-radius:8px;padding:9px 12px;box-shadow:0 8px 24px rgba(19,35,59,.18); font-family:'Archivo',sans-serif;color:#13233b; }
  #tip.on{opacity:1;transform:translateY(0);}
  #tip .t-name{font-weight:800;font-size:13.5px;line-height:1.2;}
  #tip .t-meta{font-weight:600;font-size:11px;color:#5d6975;margin-top:3px;}
  #tip .t-val{font-weight:800;font-size:14px;margin-top:5px;}
</style>
</head>
<body>
<div class="wrap"><div id="map"></div><div id="tip"></div></div>
<script>
const DATA = [{"p":"Shane Legg","k":"Forschung","y":2011,"o":"5-50%","v":27.5,"i":0},{"p":"ML-Forschende (AI Impacts Expert Survey 2016)","k":"Umfrage","y":2016,"o":"5% (Median)","v":5.0,"i":2},{"p":"Toby Ord","k":"Forschung","y":2020,"o":"10% (nur KI)","v":10.0,"i":3},{"p":"KI-Sicherheitsforschende (44 Personen)","k":"Umfrage","y":2021,"o":"30% (Mittelwert)","v":30.0,"i":4},{"p":"Holden Karnofsky","k":"Forschung/Industrie","y":2022,"o":"10-90%","v":50.0,"i":5},{"p":"ML-Forschende (AI Impacts Survey 2022)","k":"Umfrage","y":2022,"o":"5% (Median); ~14% (Mittel)","v":14.0,"i":6},{"p":"Dan Hendrycks","k":"Forschung","y":2023,"o":"~20%","v":20.0,"i":7},{"p":"Paul Christiano","k":"Forschung","y":2023,"o":"~46%","v":46.0,"i":8},{"p":"Geoffrey Hinton","k":"Forschung","y":2023,"o":"~10%","v":10.0,"i":9},{"p":"Marc Andreessen","k":"CEO/Industrie","y":2023,"o":"~0%","v":0.0,"i":11},{"p":"Yoshua Bengio","k":"Forschung","y":2023,"o":"~20%","v":20.0,"i":12},{"p":"Superforecaster (XPT-Studie)","k":"Prognose","y":2023,"o":"0,38%","v":0.38,"i":13},{"p":"KI-Domaenenexperten (XPT-Studie)","k":"Prognose","y":2023,"o":"3% (Ausloeschung) / 12% (Katastrophe)","v":3.0,"i":14},{"p":"Ajeya Cotra","k":"Forschung","y":2023,"o":"20-30%","v":25.0,"i":17},{"p":"Kevin Roose","k":"Journalismus","y":2023,"o":"5%","v":5.0,"i":18},{"p":"Scott Alexander","k":"Journalismus","y":2023,"o":"33%","v":33.0,"i":19},{"p":"Eli Lifland","k":"Prognose","y":2023,"o":"35%","v":35.0,"i":20},{"p":"Eliezer Yudkowsky","k":"Forschung","y":2023,"o":">95%","v":97.0,"i":21},{"p":"Dario Amodei","k":"CEO/Industrie","y":2023,"o":"10-25%","v":17.5,"i":22},{"p":"Dan Hendrycks","k":"Forschung","y":2023,"o":">80%","v":82.0,"i":23},{"p":"Jan Leike","k":"Forschung","y":2023,"o":"10-90%","v":50.0,"i":24},{"p":"Emmett Shear","k":"CEO/Industrie","y":2023,"o":"5-50%","v":27.5,"i":25},{"p":"Lina Khan","k":"Politik","y":2023,"o":"~15%","v":15.0,"i":26},{"p":"Zvi Mowshowitz","k":"Journalismus","y":2023,"o":"60%","v":60.0,"i":27},{"p":"Vitalik Buterin","k":"CEO/Industrie","y":2023,"o":"10%","v":10.0,"i":28},{"p":"Daniel Kokotajlo","k":"Forschung","y":2023,"o":"70%","v":70.0,"i":29},{"p":"Yann LeCun","k":"Forschung/Industrie","y":2023,"o":"<0,01%","v":0.01,"i":30},{"p":"KI-Ingenieure (informelle Umfrage)","k":"Umfrage","y":2023,"o":"40% (Mittelwert)","v":40.0,"i":31},{"p":"Lex Fridman","k":"Journalismus","y":2024,"o":"10%","v":10.0,"i":32},{"p":"ML-Forschende (AI Impacts Survey 2023)","k":"Umfrage","y":2024,"o":"5% (Median); 14,4% (Mittel)","v":14.4,"i":33},{"p":"Roman Yampolskiy","k":"Forschung","y":2024,"o":"99,9-99,999999%","v":99.9,"i":35},{"p":"Elon Musk","k":"CEO/Industrie","y":2024,"o":"10-20% (bis ~30%)","v":15.0,"i":36},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":"~50% ('50-50')","v":50.0,"i":37},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":">50% (eigene Einschaetzung)","v":55.0,"i":38},{"p":"Reid Hoffman","k":"CEO/Industrie","y":2024,"o":"20%","v":20.0,"i":39},{"p":"Connor Leahy","k":"Forschung/Industrie","y":2024,"o":"90%+","v":92.0,"i":40},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":"10-20% (Gesamteinschaetzung)","v":15.0,"i":41},{"p":"Emad Mostaque","k":"CEO/Industrie","y":2024,"o":"50%","v":50.0,"i":42},{"p":"Nate Silver","k":"Journalismus","y":2025,"o":"5-10%","v":7.5,"i":43},{"p":"Metaculus (Community-Aggregat)","k":"Prognose","y":2025,"o":"9% gesamt (~8 Pp. durch KI)","v":8.0,"i":44},{"p":"Daniel Kokotajlo","k":"Forschung","y":2025,"o":"70-80%","v":75.0,"i":45},{"p":"Max Tegmark","k":"Forschung","y":2025,"o":">90%","v":92.0,"i":46},{"p":"Sundar Pichai","k":"CEO/Industrie","y":2025,"o":"~10%","v":10.0,"i":47},{"p":"Elon Musk","k":"CEO/Industrie","y":2025,"o":"~10-20%","v":15.0,"i":48},{"p":"Vitalik Buterin","k":"CEO/Industrie","y":2025,"o":"12%","v":12.0,"i":49},{"p":"Zvi Mowshowitz","k":"Journalismus","y":2025,"o":"70%","v":70.0,"i":50},{"p":"Dario Amodei","k":"CEO/Industrie","y":2025,"o":"25%","v":25.0,"i":51},{"p":"Anna Salamon (laut Wikipedia-Sammlung)","k":"Forschung","y":2024,"o":"85%","v":85.0,"i":53}];
const LOW="#2A857A", MID="#C9962E", HIGH="#8B2E2E", INK="#13233b", MUT="#7c8794";
const fmt = v => (Math.abs(v%1)<1e-9 ? v.toFixed(0) : (''+v).replace(".",","));
const bandOf = v => v<10?'low' : (v<50?'mid':'high');
const colOf = b => b==='low'?LOW : b==='mid'?MID:HIGH;
function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const mean=a=>a.reduce((s,x)=>s+x,0)/a.length;
const median=a=>{const s=[...a].sort((x,y)=>x-y),n=s.length;return n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2;};

/* Gruppen + Kennzahlen, sortiert nach Mittelwert */
const G={}; DATA.forEach(d=>{ (G[d.k]=G[d.k]||[]).push(d); });
const groups=Object.keys(G).map(k=>{const vs=G[k].map(d=>d.v);return {k,items:G[k],mean:mean(vs),median:median(vs),n:G[k].length};})
  .sort((a,b)=>b.mean-a.mean);

/* Geometrie */
const BX=236, PR=1004, TOPY=158, LANEH=66, R=6;
const axisY = TOPY + groups.length*LANEH + 14;
const x = v => BX + (v/100)*(PR-BX);

function marker(cx,cy,b){ const c=colOf(b);
  if(b==='low')  return `<circle class="mk" cx="${cx}" cy="${cy}" r="${R}" fill="${c}" fill-opacity="0.9" stroke="#fff" stroke-width="1.4"/>`;
  if(b==='mid')  return `<path class="mk" d="M${cx},${cy-R-0.5} L${cx+R+0.5},${cy} L${cx},${cy+R+0.5} L${cx-R-0.5},${cy} Z" fill="${c}" fill-opacity="0.9" stroke="#fff" stroke-width="1.4"/>`;
  return `<path class="mk" d="M${cx},${cy-R-1.4} L${cx+R+0.6},${cy+R-1.4} L${cx-R-0.6},${cy+R-1.4} Z" fill="${c}" fill-opacity="0.92" stroke="#fff" stroke-width="1.4"/>`;
}

/* Gitter */
let grid="";
[0,25,50,75,100].forEach(t=>{ grid+=`<line x1="${x(t)}" y1="${TOPY-8}" x2="${x(t)}" y2="${axisY}" stroke="${INK}" stroke-width="1" opacity="0.08"/>`
  +`<text class="nm" x="${x(t)}" y="${axisY+22}" font-size="12" text-anchor="middle" fill="${MUT}">${t}%</text>`; });
grid+=`<text class="sub2" x="${(BX+PR)/2}" y="${axisY+46}" font-size="11" text-anchor="middle" fill="${MUT}">p(doom) — GESCHÄTZTE WAHRSCHEINLICHKEIT</text>`;

/* Lanes */
const BOUND=LANEH/2-9, STEP=13.5;
const offs=[0]; for(let i=1;i<14;i++){ offs.push(i*STEP); offs.push(-i*STEP); }
let lanes="";
groups.forEach((g,gi)=>{
  const cy=TOPY+gi*LANEH+LANEH/2;
  // Lane-Hintergrund + Label
  lanes+=`<rect x="0" y="${cy-LANEH/2+4}" width="${PR}" height="${LANEH-8}" rx="8" fill="${INK}" opacity="${gi%2?0.025:0.045}"/>`;
  lanes+=`<text class="nm" x="${BX-18}" y="${cy-2}" font-size="14" text-anchor="end" fill="${INK}">${esc(g.k)}</text>`;
  lanes+=`<text class="sub2" x="${BX-18}" y="${cy+14}" font-size="10" text-anchor="end" fill="${MUT}">n = ${g.n}</text>`;
  // Punkte (Mini-Beeswarm in der Lane)
  const placed=[];
  g.items.slice().sort((a,b)=>a.v-b.v).forEach(d=>{
    const px=x(d.v); let py=cy;
    for(const o of offs){ const cand=cy+o; if(Math.abs(o)>BOUND) continue;
      let ok=true; for(const q of placed){ if(Math.abs(q.x-px)<13 && Math.abs(q.y-cand)<13){ok=false;break;} }
      if(ok){py=cand;break;} }
    placed.push({x:px,y:py});
    lanes+=`<g class="pt" data-p="${esc(d.p)}" data-o="${esc(d.o)}" data-y="${d.y}" data-v="${fmt(d.v)}">`
      +`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="10" fill="transparent"/>`
      +marker(px.toFixed(1),py.toFixed(1),bandOf(d.v))+`</g>`;
  });
  // Median (leiser Tick) + Mittelwert (kräftig)
  const mx=x(g.mean), dx=x(g.median);
  lanes+=`<line x1="${dx}" y1="${cy-BOUND-2}" x2="${dx}" y2="${cy+BOUND+2}" stroke="${MUT}" stroke-width="1.4" stroke-dasharray="3 4" opacity="0.7"/>`;
  lanes+=`<line x1="${mx}" y1="${cy-BOUND-6}" x2="${mx}" y2="${cy+BOUND+6}" stroke="${INK}" stroke-width="2.4"/>`;
  lanes+=`<path d="M${mx},${cy-BOUND-6} l5,-6 l-10,0 Z" fill="${INK}"/>`;
  const lblAnchor = mx>PR-90?'end':'start', lblX = mx>PR-90? mx-8: mx+8;
  lanes+=`<text class="vl" x="${lblX}" y="${cy-BOUND-10}" font-size="12.5" text-anchor="${lblAnchor}" fill="${INK}">Ø ${fmt(Math.round(g.mean*10)/10)} %</text>`;
});

/* Kopf + Legende */
const head=`
 <text class="hl" x="40" y="62" font-size="44">WER HAT AM MEISTEN ANGST?</text>
 <text class="sub2" x="42" y="86" font-size="12.5" fill="${INK}">p(doom) NACH ROLLE — JEDER PUNKT EINE SCHÄTZUNG, BALKEN = DURCHSCHNITT DER GRUPPE</text>
 <text class="sub2" x="42" y="104" font-size="12.5" fill="${MUT}">48 WERTE · 2011–2025 · SORTIERT NACH GRUPPEN-DURCHSCHNITT</text>`;
const lx=706, ly=30;
const legend=`
 <rect x="${lx}" y="${ly}" width="300" height="92" rx="12" fill="#fff" stroke="${INK}" stroke-width="1.5" opacity="0.95"/>
 ${marker(lx+24,ly+24,'low')}<text class="nm" x="${lx+38}" y="${ly+28}" font-size="11">&lt;10 %</text>
 ${marker(lx+96,ly+24,'mid')}<text class="nm" x="${lx+110}" y="${ly+28}" font-size="11">10–50 %</text>
 ${marker(lx+186,ly+24,'high')}<text class="nm" x="${lx+200}" y="${ly+28}" font-size="11">&gt;50 %</text>
 <line x1="${lx+18}" y1="${ly+50}" x2="${lx+18}" y2="${ly+66}" stroke="${INK}" stroke-width="2.4"/><text class="nm" x="${lx+30}" y="${ly+62}" font-size="11">Ø Mittelwert</text>
 <line x1="${lx+150}" y1="${ly+50}" x2="${lx+150}" y2="${ly+66}" stroke="${MUT}" stroke-width="1.4" stroke-dasharray="3 4"/><text class="nm" x="${lx+162}" y="${ly+62}" font-size="11">Median</text>
 <text class="sub2" x="${lx+18}" y="${ly+84}" font-size="9.5" fill="${MUT}">MAUS ÜBER EINEN PUNKT = WER &amp; WANN</text>`;
const source=`<text class="sub2" x="40" y="${axisY+72}" font-size="10.5" fill="${MUT}">QUELLE: WIKIPEDIA · PAUSEAI · AI IMPACTS · XPT · METACULUS — STAND JUNI 2026 · NUR WERTE MIT ZAHLENANGABE (48)</text>`;

const VBH = axisY+92;
document.getElementById('map').innerHTML =
 `<svg viewBox="0 0 1040 ${VBH}" xmlns="http://www.w3.org/2000/svg">${head}${legend}${grid}${lanes}${source}</svg>`;

/* Tooltip */
(function(){ const tip=document.getElementById('tip');
  document.querySelectorAll('.pt').forEach(g=>{
    g.addEventListener('pointerenter',e=>{ tip.innerHTML=`<div class="t-name">${g.dataset.p}</div><div class="t-meta">${g.dataset.y} · Angabe: ${g.dataset.o}</div><div class="t-val">p(doom) ≈ ${g.dataset.v} %</div>`; tip.classList.add('on'); move(e); });
    g.addEventListener('pointermove',move);
    g.addEventListener('pointerleave',()=>tip.classList.remove('on'));
  });
  function move(e){ const pad=14; let xx=e.clientX+pad,yy=e.clientY+pad; const w=tip.offsetWidth||240,h=tip.offsetHeight||70;
    if(xx+w>window.innerWidth) xx=e.clientX-w-pad; if(yy+h>window.innerHeight) yy=e.clientY-h-pad;
    tip.style.left=xx+'px'; tip.style.top=yy+'px'; }
})();
</script>
</body>
</html>
