<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p(doom) im Zeitverlauf — interaktiver Scatter 2011–2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#f4f1e8; --ink:#13233b; --du:#117865; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ background:var(--paper); background-image:radial-gradient(rgba(19,35,59,.03) 1px,transparent 1px);
    background-size:22px 22px; min-height:100vh; display:flex; justify-content:center; padding:clamp(10px,2.5vw,40px); }
  .wrap{width:100%;max-width:1040px;position:relative;}
  svg{width:100%;height:auto;display:block;}
  .pt{opacity:0;animation:pop .45s cubic-bezier(.2,.9,.3,1.2) forwards;animation-delay:var(--d);cursor:pointer;}
  .pt .mk{transition:transform .12s ease;}
  .pt:hover .mk{transform:scale(1.5);transform-box:fill-box;transform-origin:center;}
  .frame{opacity:0;animation:fade .8s ease .1s forwards;}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.4);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes fade{to{opacity:1;}}
  @media (prefers-reduced-motion: reduce){ .pt,.frame{animation:none;opacity:1;transform:none;} }
  .hl{font-family:'Anton',sans-serif;fill:var(--ink);letter-spacing:.5px;}
  .nm{font-family:'Archivo',sans-serif;font-weight:700;fill:var(--ink);}
  .sub2{font-family:'Archivo',sans-serif;font-weight:700;fill:var(--ink);letter-spacing:.8px;}
  text{dominant-baseline:alphabetic;}
  /* Steuerung "schätze selbst" */
  .ctrl{ margin-top:6px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:#fff; border:1px solid #d9d4c4; border-left:4px solid var(--du); border-radius:12px; padding:12px 16px;
    font-family:'Archivo',sans-serif; color:var(--ink); }
  .ctrl-lab{ font-weight:800; font-size:13px; color:var(--du); text-transform:uppercase; letter-spacing:.06em; }
  .ctrl input[type=range]{ flex:1; min-width:180px; accent-color:var(--du); height:4px; }
  .ctrl .num{ width:74px; font:inherit; font-weight:800; border:1px solid #d9d4c4; border-radius:7px; padding:5px 8px; color:var(--ink); }
  .ctrl .pct{ font-weight:800; }
  .ctrl-rank{ font-weight:700; font-size:12.5px; color:#5d6975; }
  .ctrl-rank b{ color:var(--du); }
  #tip{ position:fixed;z-index:30;pointer-events:none;opacity:0;transform:translateY(4px);
    transition:opacity .12s ease, transform .12s ease; max-width:260px;background:#fff;border:1px solid #13233b;border-left:4px solid #13233b;
    border-radius:8px;padding:9px 12px;box-shadow:0 8px 24px rgba(19,35,59,.18); font-family:'Archivo',sans-serif;color:#13233b; }
  #tip.on{opacity:1;transform:translateY(0);}
  #tip .t-name{font-weight:800;font-size:13.5px;line-height:1.2;}
  #tip .t-meta{font-weight:600;font-size:11px;color:#5d6975;margin-top:3px;}
  #tip .t-val{font-weight:800;font-size:14px;margin-top:5px;}
</style>
</head>
<body>
<div class="wrap">
  <div id="map"></div>
  <div class="ctrl">
    <span class="ctrl-lab">Schätz selbst</span>
    <input type="range" id="slider" min="0" max="100" step="0.5" value="10" aria-label="Deine p(doom)-Schätzung">
    <span><input class="num" id="num" type="number" min="0" max="100" step="0.5" value="10" title="Deine p(doom)-Schätzung in Prozent" aria-label="Deine p(doom)-Schätzung in Prozent"><span class="pct"> %</span></span>
    <span class="ctrl-rank" id="rank"></span>
  </div>
  <div id="tip"></div>
</div>
<script>
const DATA = [{"p":"Shane Legg","k":"Forschung","y":2011,"o":"5-50%","v":27.5,"i":0},{"p":"ML-Forschende (AI Impacts Expert Survey 2016)","k":"Umfrage","y":2016,"o":"5% (Median)","v":5.0,"i":2},{"p":"Toby Ord","k":"Forschung","y":2020,"o":"10% (nur KI)","v":10.0,"i":3},{"p":"KI-Sicherheitsforschende (44 Personen)","k":"Umfrage","y":2021,"o":"30% (Mittelwert)","v":30.0,"i":4},{"p":"Holden Karnofsky","k":"Forschung/Industrie","y":2022,"o":"10-90%","v":50.0,"i":5},{"p":"ML-Forschende (AI Impacts Survey 2022)","k":"Umfrage","y":2022,"o":"5% (Median); ~14% (Mittel)","v":14.0,"i":6},{"p":"Dan Hendrycks","k":"Forschung","y":2023,"o":"~20%","v":20.0,"i":7},{"p":"Paul Christiano","k":"Forschung","y":2023,"o":"~46%","v":46.0,"i":8},{"p":"Geoffrey Hinton","k":"Forschung","y":2023,"o":"~10%","v":10.0,"i":9},{"p":"Marc Andreessen","k":"CEO/Industrie","y":2023,"o":"~0%","v":0.0,"i":11},{"p":"Yoshua Bengio","k":"Forschung","y":2023,"o":"~20%","v":20.0,"i":12},{"p":"Superforecaster (XPT-Studie)","k":"Prognose","y":2023,"o":"0,38%","v":0.38,"i":13},{"p":"KI-Domaenenexperten (XPT-Studie)","k":"Prognose","y":2023,"o":"3% (Ausloeschung) / 12% (Katastrophe)","v":3.0,"i":14},{"p":"Ajeya Cotra","k":"Forschung","y":2023,"o":"20-30%","v":25.0,"i":17},{"p":"Kevin Roose","k":"Journalismus","y":2023,"o":"5%","v":5.0,"i":18},{"p":"Scott Alexander","k":"Journalismus","y":2023,"o":"33%","v":33.0,"i":19},{"p":"Eli Lifland","k":"Prognose","y":2023,"o":"35%","v":35.0,"i":20},{"p":"Eliezer Yudkowsky","k":"Forschung","y":2023,"o":">95%","v":97.0,"i":21},{"p":"Dario Amodei","k":"CEO/Industrie","y":2023,"o":"10-25%","v":17.5,"i":22},{"p":"Dan Hendrycks","k":"Forschung","y":2023,"o":">80%","v":82.0,"i":23},{"p":"Jan Leike","k":"Forschung","y":2023,"o":"10-90%","v":50.0,"i":24},{"p":"Emmett Shear","k":"CEO/Industrie","y":2023,"o":"5-50%","v":27.5,"i":25},{"p":"Lina Khan","k":"Politik","y":2023,"o":"~15%","v":15.0,"i":26},{"p":"Zvi Mowshowitz","k":"Journalismus","y":2023,"o":"60%","v":60.0,"i":27},{"p":"Vitalik Buterin","k":"CEO/Industrie","y":2023,"o":"10%","v":10.0,"i":28},{"p":"Daniel Kokotajlo","k":"Forschung","y":2023,"o":"70%","v":70.0,"i":29},{"p":"Yann LeCun","k":"Forschung/Industrie","y":2023,"o":"<0,01%","v":0.01,"i":30},{"p":"KI-Ingenieure (informelle Umfrage)","k":"Umfrage","y":2023,"o":"40% (Mittelwert)","v":40.0,"i":31},{"p":"Lex Fridman","k":"Journalismus","y":2024,"o":"10%","v":10.0,"i":32},{"p":"ML-Forschende (AI Impacts Survey 2023)","k":"Umfrage","y":2024,"o":"5% (Median); 14,4% (Mittel)","v":14.4,"i":33},{"p":"Roman Yampolskiy","k":"Forschung","y":2024,"o":"99,9-99,999999%","v":99.9,"i":35},{"p":"Elon Musk","k":"CEO/Industrie","y":2024,"o":"10-20% (bis ~30%)","v":15.0,"i":36},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":"~50% ('50-50')","v":50.0,"i":37},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":">50% (eigene Einschaetzung)","v":55.0,"i":38},{"p":"Reid Hoffman","k":"CEO/Industrie","y":2024,"o":"20%","v":20.0,"i":39},{"p":"Connor Leahy","k":"Forschung/Industrie","y":2024,"o":"90%+","v":92.0,"i":40},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":"10-20% (Gesamteinschaetzung)","v":15.0,"i":41},{"p":"Emad Mostaque","k":"CEO/Industrie","y":2024,"o":"50%","v":50.0,"i":42},{"p":"Nate Silver","k":"Journalismus","y":2025,"o":"5-10%","v":7.5,"i":43},{"p":"Metaculus (Community-Aggregat)","k":"Prognose","y":2025,"o":"9% gesamt (~8 Pp. durch KI)","v":8.0,"i":44},{"p":"Daniel Kokotajlo","k":"Forschung","y":2025,"o":"70-80%","v":75.0,"i":45},{"p":"Max Tegmark","k":"Forschung","y":2025,"o":">90%","v":92.0,"i":46},{"p":"Sundar Pichai","k":"CEO/Industrie","y":2025,"o":"~10%","v":10.0,"i":47},{"p":"Elon Musk","k":"CEO/Industrie","y":2025,"o":"~10-20%","v":15.0,"i":48},{"p":"Vitalik Buterin","k":"CEO/Industrie","y":2025,"o":"12%","v":12.0,"i":49},{"p":"Zvi Mowshowitz","k":"Journalismus","y":2025,"o":"70%","v":70.0,"i":50},{"p":"Dario Amodei","k":"CEO/Industrie","y":2025,"o":"25%","v":25.0,"i":51},{"p":"Anna Salamon (laut Wikipedia-Sammlung)","k":"Forschung","y":2024,"o":"85%","v":85.0,"i":53}];
const LOW="#2A857A", MID="#C9962E", HIGH="#8B2E2E", INK="#13233b", MUT="#7c8794", DU="#117865";
const fmt = v => (Math.abs(v%1)<1e-9 ? v.toFixed(0) : (''+v).replace(".",","));
const bandOf = v => v<10?'low' : (v<50?'mid':'high');
const colOf = b => b==='low'?LOW : b==='mid'?MID:HIGH;
function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const Y0=2011, Y1=2025;
const PL=66, PR=1012, TOP=78, AX=602, VBH=686;
const x = yr => PL + (yr-Y0)/(Y1-Y0)*(PR-PL);
const y = v  => AX - (v/100)*(AX-TOP);
const SP=(PR-PL)/(Y1-Y0);

function marker(cx,cy,b){ const c=colOf(b), r=6.2;
  if(b==='low')  return `<circle class="mk" cx="${cx}" cy="${cy}" r="${r}" fill="${c}" fill-opacity="0.9" stroke="#fff" stroke-width="1.4"/>`;
  if(b==='mid')  return `<path class="mk" d="M${cx},${cy-r-0.5} L${cx+r+0.5},${cy} L${cx},${cy+r+0.5} L${cx-r-0.5},${cy} Z" fill="${c}" fill-opacity="0.9" stroke="#fff" stroke-width="1.4"/>`;
  return `<path class="mk" d="M${cx},${cy-r-1.4} L${cx+r+0.6},${cy+r-1.4} L${cx-r-0.6},${cy+r-1.4} Z" fill="${c}" fill-opacity="0.92" stroke="#fff" stroke-width="1.4"/>`;
}

/* Jitter innerhalb eines Jahres */
const byYear={}; DATA.forEach(d=>{ (byYear[d.y]=byYear[d.y]||[]).push(d); });
const POS={};
Object.keys(byYear).forEach(yr=>{
  const a=byYear[yr].slice().sort((p,q)=>p.v-q.v); const n=a.length;
  const gap=Math.min(11,(SP*0.72)/Math.max(1,n-1));
  a.forEach((d,k)=>{ POS[d.i]={px:x(+yr)+(k-(n-1)/2)*gap, py:y(d.v)}; });
});

/* Achsen / Grid */
let grid=`<line x1="${PL}" y1="${AX}" x2="${PR}" y2="${AX}" stroke="${INK}" stroke-width="2"/><line x1="${PL}" y1="${TOP-6}" x2="${PL}" y2="${AX}" stroke="${INK}" stroke-width="1.4"/>`;
[0,25,50,75,100].forEach(v=>{ grid+=`<line x1="${PL}" y1="${y(v)}" x2="${PR}" y2="${y(v)}" stroke="${INK}" stroke-width="1" opacity="0.08"/><text class="nm" x="${PL-10}" y="${y(v)+4}" font-size="12" text-anchor="end" fill="${MUT}">${v}%</text>`; });
for(let yr=Y0;yr<=Y1;yr++){ grid+=`<text class="nm" x="${x(yr)}" y="${AX+22}" font-size="10.5" text-anchor="middle" fill="${MUT}">'${String(yr).slice(2)}</text>`; }
grid+=`<text class="sub2" x="${(PL+PR)/2}" y="${AX+46}" font-size="11" text-anchor="middle" fill="${MUT}">JAHR DER ÖFFENTLICHEN AUSSAGE</text>`;
grid+=`<text class="sub2" x="${PL-46}" y="${(TOP+AX)/2}" font-size="11" text-anchor="middle" fill="${MUT}" transform="rotate(-90 ${PL-46} ${(TOP+AX)/2})">p(doom) — WAHRSCHEINLICHKEIT</text>`;

/* 2023-Wendepunkt (Annotation, keine Verbindungslinie) */
const wp=`<rect x="${x(2023)-30}" y="${TOP-6}" width="60" height="${AX-TOP+6}" fill="${HIGH}" opacity="0.045"/>`
  +`<line x1="${x(2023)}" y1="${TOP-6}" x2="${x(2023)}" y2="${AX}" stroke="${HIGH}" stroke-width="1.2" stroke-dasharray="6 5" opacity="0.45"/>`
  +`<text class="sub2" x="${x(2023)}" y="${TOP-12}" font-size="10" text-anchor="middle" fill="${HIGH}">2023 · GPT-4</text>`;

/* Punkte – sequenziell nach (Jahr, i) */
const order=DATA.slice().sort((a,b)=> a.y-b.y || a.i-b.i);
const seq={}; order.forEach((d,k)=> seq[d.i]=(0.25+k*0.055).toFixed(2));
let dots=DATA.map(d=>{ const b=bandOf(d.v), P=POS[d.i];
  return `<g class="pt" style="--d:${seq[d.i]}s" data-p="${esc(d.p)}" data-o="${esc(d.o)}" data-y="${d.y}" data-v="${fmt(d.v)}">`
    + `<circle cx="${P.px.toFixed(1)}" cy="${P.py.toFixed(1)}" r="11" fill="transparent"/>`
    + marker(P.px.toFixed(1),P.py.toFixed(1),b) + `</g>`;
}).join("");

/* Deine-Schätzung-Linie (wird per Slider aktualisiert) */
const uline=`<g class="frame"><line id="uline" x1="${PL}" y1="${y(10)}" x2="${PR}" y2="${y(10)}" stroke="${DU}" stroke-width="2.4" stroke-dasharray="2 7" stroke-linecap="round"/>`
  +`<rect id="ubox" x="${PR-92}" y="${y(10)-12}" width="86" height="22" rx="6" fill="${DU}"/>`
  +`<text id="ulabel" class="nm" x="${PR-49}" y="${y(10)+3}" font-size="11.5" text-anchor="middle" fill="#fff">DU · 10 %</text></g>`;

/* Kopf + Legende */
const head=`
 <text class="hl" x="40" y="50" font-size="44">p(doom) IM ZEITVERLAUF</text>
 <text class="sub2" x="42" y="${68}" font-size="12" fill="${MUT}">JEDE SCHÄTZUNG ALS PUNKT NACH JAHR · 48 WERTE · 2011–2025 · MAUS ÜBER EINEN PUNKT = WER &amp; WANN</text>`;
const lx=716, ly=74;
const legend=`
 <rect x="${lx}" y="${ly}" width="294" height="74" rx="12" fill="#fff" stroke="${INK}" stroke-width="1.5" opacity="0.95"/>
 ${marker(lx+24,ly+24,'low')}<text class="nm" x="${lx+40}" y="${ly+28}" font-size="11.5">Niedrig <tspan fill="${MUT}">&lt;10 %</tspan></text>
 ${marker(lx+128,ly+24,'mid')}<text class="nm" x="${lx+144}" y="${ly+28}" font-size="11.5">Mittel <tspan fill="${MUT}">10–50 %</tspan></text>
 ${marker(lx+24,ly+52,'high')}<text class="nm" x="${lx+40}" y="${ly+56}" font-size="11.5">Hoch <tspan fill="${MUT}">&gt;50 %</tspan></text>
 <line x1="${lx+150}" y1="${ly+52}" x2="${lx+178}" y2="${ly+52}" stroke="${DU}" stroke-width="2.4" stroke-dasharray="2 6"/><text class="nm" x="${lx+184}" y="${ly+56}" font-size="11.5">Deine Schätzung</text>`;
const source=`<text class="sub2" x="40" y="${VBH-12}" font-size="10.5" fill="${MUT}">QUELLE: WIKIPEDIA · PAUSEAI · AI IMPACTS · XPT · METACULUS — STAND JUNI 2026 · MEHRFACHNENNUNGEN JE PERSON NACH DATUM</text>`;

document.getElementById('map').innerHTML =
 `<svg viewBox="0 0 1040 ${VBH}" xmlns="http://www.w3.org/2000/svg">
   <g class="frame">${grid}${wp}${legend}${head}</g>
   ${uline}${dots}${source}
  </svg>`;

/* Tooltip */
(function(){
  const tip=document.getElementById('tip');
  document.querySelectorAll('.pt').forEach(g=>{
    g.addEventListener('pointerenter',e=>{
      tip.innerHTML=`<div class="t-name">${g.dataset.p}</div><div class="t-meta">${g.dataset.y} · Angabe: ${g.dataset.o}</div><div class="t-val">p(doom) ≈ ${g.dataset.v} %</div>`;
      tip.classList.add('on'); move(e);
    });
    g.addEventListener('pointermove',move);
    g.addEventListener('pointerleave',()=>tip.classList.remove('on'));
  });
  function move(e){ const pad=14; let xx=e.clientX+pad,yy=e.clientY+pad; const w=tip.offsetWidth||240,h=tip.offsetHeight||70;
    if(xx+w>window.innerWidth) xx=e.clientX-w-pad; if(yy+h>window.innerHeight) yy=e.clientY-h-pad;
    tip.style.left=xx+'px'; tip.style.top=yy+'px'; }
})();

/* "Schätz selbst" – Linie + Rang aktualisieren */
(function(){
  const sl=document.getElementById('slider'), nu=document.getElementById('num'), rank=document.getElementById('rank');
  const line=document.getElementById('uline'), box=document.getElementById('ubox'), lab=document.getElementById('ulabel');
  const vals=DATA.map(d=>d.v).sort((a,b)=>a-b);
  function setv(v){
    v=Math.max(0,Math.min(100,+v||0));
    const yy=y(v);
    line.setAttribute('y1',yy); line.setAttribute('y2',yy);
    box.setAttribute('y', yy-12); lab.setAttribute('y', yy+3);
    lab.textContent='DU · '+fmt(Math.round(v*10)/10)+' %';
    const below=vals.filter(x=>x<v).length; const pct=Math.round(below/vals.length*100);
    rank.innerHTML=`höher als <b>${pct} %</b> der ${vals.length} Schätzungen`;
    if(+sl.value!==v) sl.value=v; if(+nu.value!==v) nu.value=v;
  }
  sl.addEventListener('input',e=>setv(e.target.value));
  nu.addEventListener('input',e=>setv(e.target.value));
  setv(10);
})();
</script>
</body>
</html>
