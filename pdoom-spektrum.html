<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p(doom) — Das Spektrum der KI-Risikoschätzungen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#f4f1e8; --ink:#13233b; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:radial-gradient(rgba(19,35,59,.03) 1px,transparent 1px);
    background-size:22px 22px;
    min-height:100vh;display:flex;justify-content:center;
    padding:clamp(10px,2.5vw,40px);
  }
  .wrap{width:100%;max-width:1040px;position:relative;}
  svg{width:100%;height:auto;display:block;opacity:0;animation:fade .7s ease .1s forwards;}
  @keyframes fade{to{opacity:1;}}
  @media (prefers-reduced-motion: reduce){ svg{animation:none;opacity:1;} }
  .hl{font-family:'Anton',sans-serif;fill:var(--ink);letter-spacing:.5px;}
  .nm{font-family:'Archivo',sans-serif;font-weight:700;fill:var(--ink);}
  .sub2{font-family:'Archivo',sans-serif;font-weight:700;fill:var(--ink);letter-spacing:.8px;}
  text{dominant-baseline:alphabetic;}
  .pt{cursor:pointer;}
  .pt .mk{transition:transform .12s ease;}
  .pt:hover .mk{transform:scale(1.35);transform-box:fill-box;transform-origin:center;}
  .pt:hover .wsk{opacity:.85;}
  /* Tooltip */
  #tip{
    position:fixed;z-index:30;pointer-events:none;opacity:0;transform:translateY(4px);
    transition:opacity .12s ease, transform .12s ease;
    max-width:260px;background:#fff;border:1px solid #13233b;border-left:4px solid #13233b;
    border-radius:8px;padding:9px 12px;box-shadow:0 8px 24px rgba(19,35,59,.18);
    font-family:'Archivo',sans-serif;color:#13233b;
  }
  #tip.on{opacity:1;transform:translateY(0);}
  #tip .t-name{font-weight:800;font-size:13.5px;line-height:1.2;}
  #tip .t-meta{font-weight:600;font-size:11px;color:#5d6975;margin-top:3px;}
  #tip .t-val{font-weight:800;font-size:14px;margin-top:5px;}
</style>
</head>
<body>
<div class="wrap"><div id="map"></div><div id="tip"></div></div>
<script>
const DATA = [{"p":"Shane Legg","k":"Forschung","y":2011,"o":"5-50%","v":27.5,"lo":5.0,"hi":50.0,"i":0},{"p":"ML-Forschende (AI Impacts Expert Survey 2016)","k":"Umfrage","y":2016,"o":"5% (Median)","v":5.0,"lo":5,"hi":5,"i":2},{"p":"Toby Ord","k":"Forschung","y":2020,"o":"10% (nur KI)","v":10.0,"lo":10,"hi":10,"i":3},{"p":"KI-Sicherheitsforschende (44 Personen)","k":"Umfrage","y":2021,"o":"30% (Mittelwert)","v":30.0,"lo":30,"hi":30,"i":4},{"p":"Holden Karnofsky","k":"Forschung/Industrie","y":2022,"o":"10-90%","v":50.0,"lo":10.0,"hi":90.0,"i":5},{"p":"ML-Forschende (AI Impacts Survey 2022)","k":"Umfrage","y":2022,"o":"5% (Median); ~14% (Mittel)","v":14.0,"lo":5.0,"hi":14.0,"i":6},{"p":"Dan Hendrycks","k":"Forschung","y":2023,"o":"~20%","v":20.0,"lo":20,"hi":20,"i":7},{"p":"Paul Christiano","k":"Forschung","y":2023,"o":"~46%","v":46.0,"lo":46,"hi":46,"i":8},{"p":"Geoffrey Hinton","k":"Forschung","y":2023,"o":"~10%","v":10.0,"lo":10,"hi":10,"i":9},{"p":"Marc Andreessen","k":"CEO/Industrie","y":2023,"o":"~0%","v":0.0,"lo":0,"hi":0,"i":11},{"p":"Yoshua Bengio","k":"Forschung","y":2023,"o":"~20%","v":20.0,"lo":20,"hi":20,"i":12},{"p":"Superforecaster (XPT-Studie)","k":"Prognose","y":2023,"o":"0,38%","v":0.38,"lo":0.38,"hi":0.38,"i":13},{"p":"KI-Domaenenexperten (XPT-Studie)","k":"Prognose","y":2023,"o":"3% (Ausloeschung) / 12% (Katastrophe)","v":3.0,"lo":3.0,"hi":12.0,"i":14},{"p":"Ajeya Cotra","k":"Forschung","y":2023,"o":"20-30%","v":25.0,"lo":20.0,"hi":30.0,"i":17},{"p":"Kevin Roose","k":"Journalismus","y":2023,"o":"5%","v":5.0,"lo":5,"hi":5,"i":18},{"p":"Scott Alexander","k":"Journalismus","y":2023,"o":"33%","v":33.0,"lo":33,"hi":33,"i":19},{"p":"Eli Lifland","k":"Prognose","y":2023,"o":"35%","v":35.0,"lo":35,"hi":35,"i":20},{"p":"Eliezer Yudkowsky","k":"Forschung","y":2023,"o":">95%","v":97.0,"lo":97,"hi":97,"i":21},{"p":"Dario Amodei","k":"CEO/Industrie","y":2023,"o":"10-25%","v":17.5,"lo":10.0,"hi":25.0,"i":22},{"p":"Dan Hendrycks","k":"Forschung","y":2023,"o":">80%","v":82.0,"lo":82,"hi":82,"i":23},{"p":"Jan Leike","k":"Forschung","y":2023,"o":"10-90%","v":50.0,"lo":10.0,"hi":90.0,"i":24},{"p":"Emmett Shear","k":"CEO/Industrie","y":2023,"o":"5-50%","v":27.5,"lo":5.0,"hi":50.0,"i":25},{"p":"Lina Khan","k":"Politik","y":2023,"o":"~15%","v":15.0,"lo":15,"hi":15,"i":26},{"p":"Zvi Mowshowitz","k":"Journalismus","y":2023,"o":"60%","v":60.0,"lo":60,"hi":60,"i":27},{"p":"Vitalik Buterin","k":"CEO/Industrie","y":2023,"o":"10%","v":10.0,"lo":10,"hi":10,"i":28},{"p":"Daniel Kokotajlo","k":"Forschung","y":2023,"o":"70%","v":70.0,"lo":70,"hi":70,"i":29},{"p":"Yann LeCun","k":"Forschung/Industrie","y":2023,"o":"<0,01%","v":0.01,"lo":0.01,"hi":0.01,"i":30},{"p":"KI-Ingenieure (informelle Umfrage)","k":"Umfrage","y":2023,"o":"40% (Mittelwert)","v":40.0,"lo":40,"hi":40,"i":31},{"p":"Lex Fridman","k":"Journalismus","y":2024,"o":"10%","v":10.0,"lo":10,"hi":10,"i":32},{"p":"ML-Forschende (AI Impacts Survey 2023)","k":"Umfrage","y":2024,"o":"5% (Median); 14,4% (Mittel)","v":14.4,"lo":5.0,"hi":14.4,"i":33},{"p":"Roman Yampolskiy","k":"Forschung","y":2024,"o":"99,9-99,999999%","v":99.9,"lo":99.9,"hi":100.0,"i":35},{"p":"Elon Musk","k":"CEO/Industrie","y":2024,"o":"10-20% (bis ~30%)","v":15.0,"lo":10.0,"hi":20.0,"i":36},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":"~50% ('50-50')","v":50.0,"lo":50.0,"hi":50.0,"i":37},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":">50% (eigene Einschaetzung)","v":55.0,"lo":55,"hi":55,"i":38},{"p":"Reid Hoffman","k":"CEO/Industrie","y":2024,"o":"20%","v":20.0,"lo":20,"hi":20,"i":39},{"p":"Connor Leahy","k":"Forschung/Industrie","y":2024,"o":"90%+","v":92.0,"lo":92,"hi":92,"i":40},{"p":"Geoffrey Hinton","k":"Forschung","y":2024,"o":"10-20% (Gesamteinschaetzung)","v":15.0,"lo":10.0,"hi":20.0,"i":41},{"p":"Emad Mostaque","k":"CEO/Industrie","y":2024,"o":"50%","v":50.0,"lo":50,"hi":50,"i":42},{"p":"Nate Silver","k":"Journalismus","y":2025,"o":"5-10%","v":7.5,"lo":5.0,"hi":10.0,"i":43},{"p":"Metaculus (Community-Aggregat)","k":"Prognose","y":2025,"o":"9% gesamt (~8 Pp. durch KI)","v":8.0,"lo":8,"hi":8,"i":44},{"p":"Daniel Kokotajlo","k":"Forschung","y":2025,"o":"70-80%","v":75.0,"lo":70.0,"hi":80.0,"i":45},{"p":"Max Tegmark","k":"Forschung","y":2025,"o":">90%","v":92.0,"lo":92,"hi":92,"i":46},{"p":"Sundar Pichai","k":"CEO/Industrie","y":2025,"o":"~10%","v":10.0,"lo":10,"hi":10,"i":47},{"p":"Elon Musk","k":"CEO/Industrie","y":2025,"o":"~10-20%","v":15.0,"lo":10.0,"hi":20.0,"i":48},{"p":"Vitalik Buterin","k":"CEO/Industrie","y":2025,"o":"12%","v":12.0,"lo":12,"hi":12,"i":49},{"p":"Zvi Mowshowitz","k":"Journalismus","y":2025,"o":"70%","v":70.0,"lo":70,"hi":70,"i":50},{"p":"Dario Amodei","k":"CEO/Industrie","y":2025,"o":"25%","v":25.0,"lo":25,"hi":25,"i":51},{"p":"Anna Salamon (laut Wikipedia-Sammlung)","k":"Forschung","y":2024,"o":"85%","v":85.0,"lo":85,"hi":85,"i":53}];
const LOW="#2A857A", MID="#C9962E", HIGH="#8B2E2E", INK="#13233b", MUT="#7c8794";
const fmt = v => (Math.abs(v%1)<1e-9 ? v.toFixed(0) : (''+v).replace(".",","));
const bandOf = v => v<10?'low' : (v<50?'mid':'high');
const colOf = b => b==='low'?LOW : b==='mid'?MID:HIGH;

/* Geometrie */
const PL=60, PR=1010, AX=740, SW_TOP=352, SW_BOT=706, SWY=529;
const x = v => PL + (v/100)*(PR-PL);

/* Marker nach Band (Form = Redundanz zur Farbe) */
function marker(cx,cy,b){
  const c=colOf(b), r=6.6;
  if(b==='low')  return `<circle class="mk" cx="${cx}" cy="${cy}" r="${r}" fill="${c}" fill-opacity="0.9" stroke="#fff" stroke-width="1.5"/>`;
  if(b==='mid')  return `<path class="mk" d="M${cx},${cy-r-0.5} L${cx+r+0.5},${cy} L${cx},${cy+r+0.5} L${cx-r-0.5},${cy} Z" fill="${c}" fill-opacity="0.9" stroke="#fff" stroke-width="1.5"/>`;
  return `<path class="mk" d="M${cx},${cy-r-1.5} L${cx+r+0.7},${cy+r-1.5} L${cx-r-0.7},${cy+r-1.5} Z" fill="${c}" fill-opacity="0.92" stroke="#fff" stroke-width="1.5"/>`;
}

/* ---------- Beeswarm-Platzierung (nach v) ---------- */
const STEP=15.5, MINDX=15, MINDY=15.5;
const offs=[0]; for(let i=1;i<46;i++){ offs.push(i*STEP); offs.push(-i*STEP); }
const pts = DATA.map(d=>({...d, b:bandOf(d.v), px:x(d.v)})).sort((a,b)=>a.v-b.v);
const placed=[];
pts.forEach(p=>{
  let py=SWY;
  for(const o of offs){
    const cand=SWY+o;
    if(cand<SW_TOP+7||cand>SW_BOT-7) continue;
    let ok=true;
    for(const q of placed){ if(Math.abs(q.px-p.px)<MINDX && Math.abs(q.py-cand)<MINDY){ ok=false; break; } }
    if(ok){ py=cand; break; }
  }
  p.py=py; placed.push(p);
});

/* Whisker (Spannen) + Marker, gruppiert für Hover/Tooltip */
let swarm = placed.map(p=>{
  const hasRange = p.hi>p.lo+1e-6;
  const wsk = hasRange
    ? `<line class="wsk" x1="${x(p.lo).toFixed(1)}" y1="${p.py}" x2="${x(p.hi).toFixed(1)}" y2="${p.py}" stroke="${colOf(p.b)}" stroke-width="2.6" stroke-linecap="round" opacity="0.4"/>`
      + `<line class="wsk" x1="${x(p.lo).toFixed(1)}" y1="${p.py-4}" x2="${x(p.lo).toFixed(1)}" y2="${p.py+4}" stroke="${colOf(p.b)}" stroke-width="1.6" opacity="0.4"/>`
      + `<line class="wsk" x1="${x(p.hi).toFixed(1)}" y1="${p.py-4}" x2="${x(p.hi).toFixed(1)}" y2="${p.py+4}" stroke="${colOf(p.b)}" stroke-width="1.6" opacity="0.4"/>`
    : '';
  return `<g class="pt" data-p="${esc(p.p)}" data-o="${esc(p.o)}" data-y="${p.y}" data-v="${fmt(p.v)}">`
    + wsk
    + `<circle cx="${p.px.toFixed(1)}" cy="${p.py}" r="11" fill="transparent"/>`
    + marker(p.px.toFixed(1), p.py, p.b)
    + `</g>`;
}).join("");
function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ---------- Zonen-Bänder ---------- */
const zones =
  `<rect x="${x(0)}"  y="${SW_TOP-6}" width="${x(10)-x(0)}"   height="${AX-SW_TOP+6}" fill="${LOW}"  opacity="0.05"/>`+
  `<rect x="${x(10)}" y="${SW_TOP-6}" width="${x(50)-x(10)}"  height="${AX-SW_TOP+6}" fill="${MID}"  opacity="0.05"/>`+
  `<rect x="${x(50)}" y="${SW_TOP-6}" width="${x(100)-x(50)}" height="${AX-SW_TOP+6}" fill="${HIGH}" opacity="0.05"/>`;

/* ---------- Achse ---------- */
const ticks=[0,10,25,50,75,100];
let axis = `<line x1="${PL}" y1="${AX}" x2="${PR}" y2="${AX}" stroke="${INK}" stroke-width="2"/>`;
axis += ticks.map(t=>
  `<line x1="${x(t)}" y1="${SW_TOP-6}" x2="${x(t)}" y2="${AX}" stroke="${INK}" stroke-width="1" opacity="0.09"/>`+
  `<line x1="${x(t)}" y1="${AX}" x2="${x(t)}" y2="${AX+7}" stroke="${INK}" stroke-width="2"/>`+
  `<text class="nm" x="${x(t)}" y="${AX+26}" font-size="14" text-anchor="middle" fill="${INK}">${t}%</text>`
).join("");
axis += `<text class="sub2" x="${(PL+PR)/2}" y="${AX+52}" font-size="11.5" text-anchor="middle" fill="${MUT}">p(doom) — GESCHÄTZTE WAHRSCHEINLICHKEIT EINER KI-KATASTROPHE</text>`;

/* ---------- Median / Mittelwert ---------- */
const MEDIAN=22.5, MEAN=33.83;
function statLine(v,label){ const px=x(v);
  return `<line x1="${px}" y1="178" x2="${px}" y2="${AX}" stroke="${INK}" stroke-width="2" stroke-dasharray="7 6" opacity="0.5"/>`+
         `<text class="sub2" x="${px}" y="170" font-size="11" text-anchor="middle" fill="${INK}">${label}</text>`; }
const stats = statLine(MEDIAN,'MEDIAN 22,5 %') + statLine(MEAN,'Ø 33,8 %');

/* ---------- Annotations-Rail ---------- */
const LAB=[
 {v:0.01,t:'LeCun · <0,01 %'},{v:5,t:'Große Umfrage · Median 5 %'},{v:15,t:'Musk · 10–20 %'},
 {v:25,t:'Amodei · 25 %'},{v:50,t:'Hinton · „50-50"'},{v:75,t:'Kokotajlo · 70–80 %'},
 {v:92,t:'Tegmark · >90 %'},{v:97,t:'Yudkowsky · >95 %'},{v:99.9,t:'Yampolskiy · 99,9 %'},
];
const ROWY=[330,296,262,228]; const rowRight=[];
let rail="";
LAB.sort((a,b)=>a.v-b.v).forEach(d=>{
  const px=x(d.v); const w=d.t.length*6.5+16;
  let anchor='middle'; if(px<160) anchor='start'; else if(px>905) anchor='end';
  const left = anchor==='start'? px : (anchor==='end'? px-w : px-w/2);
  let row=0; for(; row<ROWY.length; row++){ if((rowRight[row]??-9999) < left-12) break; }
  if(row>=ROWY.length) row=ROWY.length-1; rowRight[row]=left+w;
  const ly=ROWY[row];
  rail += `<line x1="${px}" y1="${ly+6}" x2="${px}" y2="${AX}" stroke="${INK}" stroke-width="1" opacity="0.14"/>`+
          `<circle cx="${px}" cy="${ly+6}" r="2.6" fill="${INK}"/>`+
          `<rect x="${(left-7).toFixed(1)}" y="${ly-13}" width="${(w+14).toFixed(1)}" height="20" rx="5" fill="#fff" stroke="${INK}" stroke-width="0.8" opacity="0.96"/>`+
          `<text class="nm" x="${anchor==='start'?left:anchor==='end'?left+w:px}" y="${ly+1}" font-size="11.5" text-anchor="${anchor}" fill="${INK}">${d.t}</text>`;
});

/* ---------- Kopf + Legende ---------- */
const head = `
 <text class="hl" x="40" y="74"  font-size="58">p(doom)</text>
 <text class="sub2" x="42" y="102" font-size="12.5" fill="${INK}">DIE GESCHÄTZTE WAHRSCHEINLICHKEIT EINER KI-KATASTROPHE</text>
 <text class="sub2" x="42" y="120" font-size="12.5" fill="${MUT}">54 ÖFFENTLICHE SCHÄTZUNGEN · 2011–2025 · JEDER MARKER = EINE SCHÄTZUNG</text>
`;
const lx=700, ly0=36;
const legend = `
 <rect x="${lx}" y="${ly0}" width="308" height="158" rx="12" fill="#fff" stroke="${INK}" stroke-width="1.5" opacity="0.95"/>
 <text class="sub2" x="${lx+18}" y="${ly0+22}" font-size="10.5" fill="${MUT}">WAHRSCHEINLICHKEIT p(doom)</text>
 ${marker(lx+24, ly0+42, 'low')}<text class="nm" x="${lx+40}" y="${ly0+46}" font-size="12">Niedrig <tspan fill="${MUT}">· &lt; 10 %</tspan></text>
 ${marker(lx+24, ly0+64, 'mid')}<text class="nm" x="${lx+40}" y="${ly0+68}" font-size="12">Mittel <tspan fill="${MUT}">· 10–50 %</tspan></text>
 ${marker(lx+24, ly0+86, 'high')}<text class="nm" x="${lx+40}" y="${ly0+90}" font-size="12">Hoch <tspan fill="${MUT}">· &gt; 50 %</tspan></text>
 <line x1="${lx+18}" y1="${ly0+104}" x2="${lx+290}" y2="${ly0+104}" stroke="${INK}" stroke-width="1" opacity="0.2"/>
 <line x1="${lx+18}" y1="${ly0+122}" x2="${lx+52}" y2="${ly0+122}" stroke="${MUT}" stroke-width="2.6" stroke-linecap="round"/>
 <circle cx="${lx+35}" cy="${ly0+122}" r="4.5" fill="${MUT}"/>
 <text class="nm" x="${lx+62}" y="${ly0+126}" font-size="11.5">Spanne <tspan fill="${MUT}">(lo–hi) · Marker = zentraler Wert</tspan></text>
 <text class="sub2" x="${lx+18}" y="${ly0+146}" font-size="9.5" fill="${MUT}">48 MIT ZAHLENWERT · 6 REIN QUALITATIV (NICHT ABGEBILDET)</text>
`;
const source = `<text class="sub2" x="40" y="822" font-size="11" fill="${MUT}">QUELLE: WIKIPEDIA · PAUSEAI · AI IMPACTS · FORECASTING RESEARCH INSTITUTE (XPT) · METACULUS — 54 SCHÄTZUNGEN, STAND JUNI 2026</text>`;

document.getElementById('map').innerHTML =
 `<svg viewBox="0 0 1040 845" xmlns="http://www.w3.org/2000/svg">
    ${head}${legend}${zones}${axis}${stats}${rail}${swarm}${source}
  </svg>`;

/* ---------- Tooltip ---------- */
(function(){
  const tip=document.getElementById('tip');
  document.querySelectorAll('.pt').forEach(g=>{
    g.addEventListener('pointerenter',e=>{
      tip.innerHTML = `<div class="t-name">${g.dataset.p}</div>`+
                      `<div class="t-meta">${g.dataset.y} · Angabe: ${g.dataset.o}</div>`+
                      `<div class="t-val">p(doom) ≈ ${g.dataset.v} %</div>`;
      tip.classList.add('on'); move(e);
    });
    g.addEventListener('pointermove',move);
    g.addEventListener('pointerleave',()=>tip.classList.remove('on'));
  });
  function move(e){
    const pad=14; let xx=e.clientX+pad, yy=e.clientY+pad;
    const w=tip.offsetWidth||240, h=tip.offsetHeight||70;
    if(xx+w>window.innerWidth) xx=e.clientX-w-pad;
    if(yy+h>window.innerHeight) yy=e.clientY-h-pad;
    tip.style.left=xx+'px'; tip.style.top=yy+'px';
  }
})();
</script>
</body>
</html>
