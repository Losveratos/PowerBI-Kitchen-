<svg xmlns="http://www.w3.org/2000/svg" width="860" height="310" viewBox="0 0 860 310" font-family="Geist, 'Segoe UI', system-ui, sans-serif">
  <rect width="860" height="310" fill="#FFFFFF"/>
  <text x="24" y="34" font-size="16" font-weight="700" fill="#404040">Was derselbe Stand kostet — vier Wege im Vergleich</text>
  <text x="24" y="54" font-size="12" fill="#8A8A8A">Wiederbeschaffungswert bzw. tatsächlicher Invest, in Tausend Euro (Balken = Mittelwert der Spanne)</text>

  <!-- gridlines behind the bars; scale 400 T€ = 560 px, x0 = 250 -->
  <g font-size="11" fill="#8A8A8A">
    <line x1="390" y1="70" x2="390" y2="266" stroke="#ECECE7" stroke-width="1"/>
    <text x="390" y="282" text-anchor="middle">100 T€</text>
    <line x1="530" y1="70" x2="530" y2="266" stroke="#ECECE7" stroke-width="1"/>
    <text x="530" y="282" text-anchor="middle">200 T€</text>
    <line x1="670" y1="70" x2="670" y2="266" stroke="#ECECE7" stroke-width="1"/>
    <text x="670" y="282" text-anchor="middle">300 T€</text>
    <line x1="810" y1="70" x2="810" y2="266" stroke="#ECECE7" stroke-width="1"/>
    <text x="810" y="282" text-anchor="middle">400 T€</text>
  </g>
  <line x1="250" y1="70" x2="250" y2="266" stroke="#404040" stroke-width="1.5"/>

  <!-- row 1: klassisch extern, mid 325 => 455px -->
  <text x="238" y="93" font-size="12.5" fill="#404040" text-anchor="end">Klassisch · Agentur/Freelancer</text>
  <path d="M250,76 H701 Q705,76 705,80 V98 Q705,102 701,102 H250 Z" fill="#1B9AA8"/>
  <text x="713" y="93" font-size="12.5" font-weight="700" fill="#404040">250–400 T€</text>

  <!-- row 2: klassisch intern, mid 145 => 203px -->
  <text x="238" y="141" font-size="12.5" fill="#404040" text-anchor="end">Klassisch · internes Team</text>
  <path d="M250,124 H449 Q453,124 453,128 V146 Q453,150 449,150 H250 Z" fill="#1B9AA8"/>
  <text x="461" y="141" font-size="12.5" font-weight="700" fill="#404040">130–160 T€</text>

  <!-- row 3: KI + externer PO, 5.2 => 7.3px -->
  <text x="238" y="189" font-size="12.5" fill="#404040" text-anchor="end">KI · externer PO (250 €/h)</text>
  <rect x="250" y="172" width="7.3" height="26" rx="2" fill="#C25A2D"/>
  <text x="265" y="189" font-size="12.5" font-weight="700" fill="#C25A2D">5,2 T€</text>

  <!-- row 4: KI + intern, 2.2 => 3.1px -->
  <text x="238" y="237" font-size="12.5" fill="#404040" text-anchor="end">KI · interner PO (100 €/h)</text>
  <rect x="250" y="220" width="3.1" height="26" rx="1.5" fill="#C25A2D"/>
  <text x="261" y="237" font-size="12.5" font-weight="700" fill="#C25A2D">2,2 T€</text>

  <text x="24" y="302" font-size="11" fill="#8A8A8A">Annahmen: 14–18 Personenmonate klassisch · KI-gestützt: 20 h Product-Owner-Steuerung + 180 € Werkzeuge (Methodik im Anhang)</text>
</svg>
